<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>HA. — Mobile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=17">
<style>
  html,body{background:#1e1b18}
  .stage{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:30px 0;
    background:
      radial-gradient(ellipse at top,#3a3530 0%,#1e1b18 70%);
  }
  .stage-inner{display:flex;flex-direction:column;align-items:center;gap:16px}
  .stage-label{
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;
    color:rgba(243,239,230,.5);text-transform:uppercase;
  }
  .device-wrap{
    width:390px;height:844px;
    border-radius:54px;overflow:hidden;position:relative;
    background:#f3efe6;
    box-shadow:
      0 0 0 12px #0a0a0a,
      0 0 0 13px rgba(255,255,255,.05),
      0 40px 80px rgba(0,0,0,.5),
      0 20px 40px rgba(0,0,0,.3);
  }
  .device-wrap::before{
    content:'';position:absolute;top:12px;left:50%;transform:translateX(-50%);
    width:120px;height:34px;border-radius:20px;background:#000;z-index:99;
  }
  .device-screen{
    width:100%;height:100%;overflow:auto;position:relative;
    -webkit-overflow-scrolling:touch;
    background:#f3efe6;
  }
  .device-screen::-webkit-scrollbar{display:none}
  .device-screen{scrollbar-width:none}

  /* Topographic canvas — behind hero only */
  #topo-canvas{
    position:absolute;top:0;left:0;right:0;height:720px;
    pointer-events:none;z-index:1;opacity:.85;
  }
  #root{z-index:2}

  /* Status bar — fixed with paper backdrop so it blends with content */
  .status-bar{
    position:absolute;top:0;left:0;right:0;height:50px;z-index:50;
    display:flex;justify-content:space-between;align-items:center;
    padding:18px 32px 0;pointer-events:none;
    font-family:-apple-system,'SF Pro',system-ui;font-weight:590;
    font-size:15px;color:#1a1916;
    background:linear-gradient(to bottom, rgba(243,239,230,1) 60%, rgba(243,239,230,0.85) 85%, rgba(243,239,230,0) 100%);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
  }
  .sb-icons{display:flex;gap:5px;align-items:center}
  .sb-icons svg{display:block}

  /* Push content below status bar; topbar sits just under it */
  .device-screen > #root > main{padding-top:57px;padding-bottom:76px}
  .topbar{top:50px !important}
  /* TabBar and Drawer are portaled into .device-wrap (direct children of the device),
     so position:absolute pins them to the device frame, not the scroll content. */
  .device-wrap > .tabbar{
    position:absolute !important;
    bottom:0;left:0;right:0;z-index:50;
  }
  .device-wrap > .drawer{
    position:absolute !important;
    top:0;left:0;right:0;bottom:0;z-index:100;
  }

  @media (max-width:480px){
    .stage{padding:0;background:#000}
    .device-wrap{width:100vw;height:100vh;border-radius:0;box-shadow:none}
    .device-wrap::before{display:none}
    .stage-label{display:none}
  }
</style>
</head>
<body>

<div class="stage">
  <div class="stage-inner">
    <div class="stage-label">Hamza Aamer · Portfolio · Mobile Build v1</div>
    <div class="device-wrap">
      <div class="status-bar">
        <span>9:41</span>
        <div class="sb-icons">
          <svg width="17" height="11" viewBox="0 0 17 11" fill="none">
            <rect x="0" y="7" width="3" height="4" rx="0.5" fill="currentColor"/>
            <rect x="4.5" y="5" width="3" height="6" rx="0.5" fill="currentColor"/>
            <rect x="9" y="2.5" width="3" height="8.5" rx="0.5" fill="currentColor"/>
            <rect x="13.5" y="0" width="3" height="11" rx="0.5" fill="currentColor"/>
          </svg>
          <svg width="15" height="11" viewBox="0 0 15 11" fill="none">
            <path d="M7.5 3c2 0 3.8.8 5.2 2.1l1-1A9 9 0 007.5 1.5 9 9 0 001.3 4.1l1 1A7.4 7.4 0 017.5 3z" fill="currentColor"/>
            <path d="M7.5 6.2c1.2 0 2.3.4 3.1 1.2l1-1a6 6 0 00-8.2 0l1 1a4.4 4.4 0 013.1-1.2z" fill="currentColor"/>
            <circle cx="7.5" cy="9.5" r="1.3" fill="currentColor"/>
          </svg>
          <svg width="24" height="12" viewBox="0 0 24 12" fill="none">
            <rect x="0.5" y="0.5" width="21" height="11" rx="3" stroke="currentColor" opacity="0.4" fill="none"/>
            <rect x="2" y="2" width="15" height="8" rx="1.5" fill="currentColor"/>
            <path d="M22.5 4v4c.7-.3 1.2-1 1.2-2s-.5-1.7-1.2-2z" fill="currentColor" opacity="0.5"/>
          </svg>
        </div>
      </div>

      <div class="device-screen" id="screen">
        <canvas id="topo-canvas" aria-hidden="true"></canvas>
        <div id="root"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script type="text/babel" src="components/Shared.jsx"></script>
<script type="text/babel" src="components/Nav.jsx"></script>
<script type="text/babel" src="components/Top.jsx"></script>
<script type="text/babel" src="components/Work.jsx"></script>
<script type="text/babel" src="components/Rest.jsx"></script>
<script src="components/topo.js"></script>

<script type="text/babel">
function App() {
  const [drawer, setDrawer] = React.useState(false);
  const [scrolled, setScrolled] = React.useState(false);
  const [active, setActive] = React.useState('home');
  const [dwell, setDwell] = React.useState('00:00');

  const screenRef = React.useRef(null);

  // Dwell timer
  React.useEffect(() => {
    const start = Date.now();
    const id = setInterval(() => {
      const s = Math.floor((Date.now() - start) / 1000);
      const m = String(Math.floor(s / 60)).padStart(2, '0');
      const ss = String(s % 60).padStart(2, '0');
      setDwell(`${m}:${ss}`);
    }, 1000);
    return () => clearInterval(id);
  }, []);

  // Scroll tracking — screen (or window if full-bleed)
  React.useEffect(() => {
    const screen = document.getElementById('screen');
    if (!screen) return;
    screenRef.current = screen;

    const sections = ['home', 'about', 'work', 'timeline', 'playground', 'contact'];

    const onScroll = () => {
      const top = screen.scrollTop;
      setScrolled(top > 20);

      // Find active section — first whose top is below a threshold
      let current = 'home';
      const offset = 120;
      for (const id of sections) {
        const el = document.getElementById(id);
        if (!el) continue;
        const r = el.getBoundingClientRect();
        const screenR = screen.getBoundingClientRect();
        const relTop = r.top - screenR.top;
        if (relTop < offset) current = id;
      }
      setActive(current);
    };
    screen.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
    return () => screen.removeEventListener('scroll', onScroll);
  }, []);

  const goTo = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  return (
    <>
      <TopBar onMenu={() => setDrawer(true)} scrolled={scrolled} dwell={dwell}/>
      <main>
        <Hero/>
        <About/>
        <Affiliations/>
        <Work/>
        <Timeline/>
        <Playground/>
        <Contact/>
      </main>
      {ReactDOM.createPortal(<TabBar active={active} onGo={goTo}/>, document.querySelector('.device-wrap'))}
      {ReactDOM.createPortal(<Drawer open={drawer} onClose={() => setDrawer(false)} active={active}/>, document.querySelector('.device-wrap'))}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
